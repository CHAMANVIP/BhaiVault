<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0618;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5f7e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8fff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a4fe8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7c6fff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#roundRect)" opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#7c6fff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#7c6fff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#7c6fff" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#7c6fff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#7c6fff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#7c6fff" stroke-width="1"/>
  </g>

  <!-- Background glow orb -->
  <ellipse cx="256" cy="220" rx="160" ry="130" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- Shield shape -->
  <g filter="url(#softGlow)">
    <path d="M256 108 L340 148 L340 240 Q340 300 256 340 Q172 300 172 240 L172 148 Z"
          fill="url(#shieldGrad)" opacity="0.15"/>
  </g>
  <path d="M256 108 L340 148 L340 240 Q340 300 256 340 Q172 300 172 240 L172 148 Z"
        fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7"/>

  <!-- Shield inner highlight -->
  <path d="M256 128 L322 161 L322 240 Q322 288 256 320 Q190 288 190 240 L190 161 Z"
        fill="url(#accentGrad)" opacity="0.08"/>

  <!-- Lock body -->
  <g filter="url(#glow)">
    <!-- Lock shackle -->
    <path d="M218 218 L218 196 Q218 162 256 162 Q294 162 294 196 L294 218"
          fill="none" stroke="url(#accentGrad)" stroke-width="16" stroke-linecap="round"/>
    <!-- Lock body rectangle -->
    <rect x="206" y="218" width="100" height="82" rx="16" ry="16" fill="url(#accentGrad)"/>
    <!-- Keyhole circle -->
    <circle cx="256" cy="253" r="14" fill="#0a0618"/>
    <!-- Keyhole stem -->
    <rect x="250" y="257" width="12" height="20" rx="4" fill="#0a0618"/>
  </g>

  <!-- Top shine -->
  <rect x="0" y="0" width="512" height="80" rx="112"
        fill="white" opacity="0.04" clip-path="url(#roundRect)"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" ry="111"
        fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.35"/>
</svg>
